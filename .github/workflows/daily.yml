name: ArXiv Cast daily digest

on:
  schedule:
    - cron: "45 10 * * *"   # 10:45 UTC = 16:15 IST
  workflow_dispatch:         # manual trigger from GitHub Actions tab

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily pipeline
        env:
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          LEMONFOX_API_KEY:      ${{ secrets.LEMONFOX_API_KEY }}
          WASENDER_API_KEY:      ${{ secrets.WASENDER_API_KEY }}
          WHATSAPP_TO:           ${{ secrets.WHATSAPP_TO }}
        run: python daily_runner.py
