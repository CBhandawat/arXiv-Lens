# Save this file to: .github/workflows/daily_email.yml in your arXiv-Lens repo

name: Daily arXiv Email Digest

on:
  schedule:
    - cron: "30 3 * * *"   # 9:00 AM IST daily (UTC+5:30) — adjust as needed
  workflow_dispatch: {}     # lets you trigger it manually from the Actions tab

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 groq supabase

      - name: Run digest script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          ARXIV_CATEGORIES: "cs.AI,cs.CL,cs.LG"
          MAX_PAPERS: "10"
        run: python email_digest.py
